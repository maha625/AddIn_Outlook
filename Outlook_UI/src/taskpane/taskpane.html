<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diva Add-in</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-p75x49JvPW0q5lpdSX3nTQy7ItFZy5xGuS8/oE0HBg7jB+PmIo0WgGIA7/nbH3QA8gCWPiyvzN6lP4gpxO+IXg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="taskpane.css" />
</head>

<body>

  <!-- ═══════════════════════════════════════
       ZONE 1 — HEADER : identité utilisateur
  ═══════════════════════════════════════ -->
  <header class="header">
    <div class="header-brand">
      <div class="brand-mark">
        <svg width="20" height="20" viewBox="0 0 22 22" fill="none">
          <rect x="1" y="1" width="9" height="9" rx="2" fill="currentColor" opacity="0.9" />
          <rect x="12" y="1" width="9" height="9" rx="2" fill="currentColor" opacity="0.4" />
          <rect x="1" y="12" width="9" height="9" rx="2" fill="currentColor" opacity="0.4" />
          <rect x="12" y="12" width="9" height="9" rx="2" fill="currentColor" opacity="0.9" />
        </svg>
      </div>
      <span class="brand-name">DIVA</span>
    </div>

    <div class="header-user">
      <div class="user-avatar" id="user-avatar">—</div>
      <div class="user-details">
        <span class="user-name" id="user-name">Chargement…</span>
        <span class="user-email" id="user-email"></span>
      </div>
    </div>


  </header>

  <!-- ═══════════════════════════════════════
       ZONE 2 — MAIN : email + actions
  ═══════════════════════════════════════ -->
  <main class="main">

    <!-- Carte email actif -->
    <section class="email-card">
      <div class="email-card-label">Email actif</div>
      <div class="email-subject" id="email-subject">—</div>
      <div class="email-meta">
        <div class="email-meta-item">
          <span class="meta-key">De</span>
          <span class="meta-val" id="sender-email">—</span>
        </div>
    </section>

    <!-- Boutons d'actions métier -->
    <section class="actions-section">
      <div class="actions-label">Créer un événement</div>
      <div class="actions-grid" id="actions">
        <div class="loading-placeholder">Chargement des actions…</div>
      </div>
    </section>

  </main>

  <!-- ═══════════════════════════════════════
       ZONE 3 — FOOTER : statut système
  ═══════════════════════════════════════ -->
  <footer class="footer">
    <div class="status-bar">
      <div class="status-indicator" id="status-indicator"></div>
      <span class="status-text" id="status">Initialisation…</span>
    </div>
    <div class="footer-meta">
      <span class="footer-brand">Diva Easy</span>
    </div>
  </footer>

  <script src="taskpane.ts"></script>
</body>

</html>
